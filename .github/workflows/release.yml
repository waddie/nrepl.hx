name: Build and Release Dynamic Libraries

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual dry-run: builds artifacts but skips the release/upload job.
  workflow_dispatch:

# Least-privilege default for all jobs; the release job widens this to
# `contents: write` for itself.
permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon (native on the arm64 runner)
          - os: macos-14
            target: aarch64-apple-darwin
            platform: aarch64-macos
            asset_name: libsteel_nrepl-aarch64-macos.dylib
            built_name: libsteel_nrepl.dylib

          # macOS — Intel (cross-compiled from the arm64 runner; the Apple
          # toolchain ships both arches, so no extra linker is needed)
          - os: macos-14
            target: x86_64-apple-darwin
            platform: x86_64-macos
            asset_name: libsteel_nrepl-x86_64-macos.dylib
            built_name: libsteel_nrepl.dylib

          # Linux — x86_64 (GNU)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: x86_64-linux
            asset_name: libsteel_nrepl-x86_64-linux.so
            built_name: libsteel_nrepl.so

          # Windows — x86_64 (MSVC)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: x86_64-windows
            asset_name: steel_nrepl-x86_64-windows.dll
            built_name: steel_nrepl.dll

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build steel-nrepl cdylib
        run: cargo build --release --locked -p steel-nrepl --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          mv "target/${{ matrix.target }}/release/${{ matrix.built_name }}" "./${{ matrix.asset_name }}"

      - name: Upload artifact for release job
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}
          path: ./${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    # Only publish a release for tag pushes (workflow_dispatch is a dry-run).
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify cog.scm version matches the tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cog_version="$(grep -E '^\(define version ' cog.scm | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$tag" != "$cog_version" ]; then
            echo "::error::tag v$tag does not match cog.scm version $cog_version" >&2
            exit 1
          fi
          echo "cog.scm version $cog_version matches tag v$tag"
          # Forge reads cog.scm as data (no evaluation), so the dylib URLs are
          # literal strings that must be bumped by hand. Guard against drift:
          # every release-download URL must carry the tag being released.
          stale="$(grep -oE 'releases/download/v[0-9][^/]*/' cog.scm | grep -v "releases/download/v$tag/" || true)"
          if [ -n "$stale" ]; then
            echo "::error::cog.scm has dylib URLs not pointing at v$tag:" >&2
            echo "$stale" >&2
            exit 1
          fi
          echo "all cog.scm dylib URLs point at v$tag"

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List downloaded files
        run: ls -R artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: artifacts/**/*
